### BEGIN /etc/grub.d/30_uefi-firmware ###
if [ "$grub_platform" = "efi" ]; then
	fwsetup --is-supported
	if [ "$?" = 0 ]; then
		menuentry 'UEFI Firmware Settings' --class uefi  $menuentry_id_option 'uefi-firmware' {
			fwsetup
		}
	fi
fi
