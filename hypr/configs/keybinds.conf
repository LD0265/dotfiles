$terminal = kitty
$fileManager = dolphin
$menu = pgrep wofi || wofi --show drun
$clipboard = cliphist list
$browser = firefox-developer-edition
$discord = discord
$steam = steam
$textEditor = code

$mainMod = SUPER

# Scripts and apps binds

## Exec
bind = $mainMod, T, exec, $terminal
bind = $mainMod  SHIFT, T, exec, $terminal --class=kitty_small
bind = $mainMod, A, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, $discord
bind = $mainMod, S, exec, $steam
bind = $mainMod, C, exec, $textEditor
bind = $mainMod, V, exec, $clipboard | wofi --dmenu | cliphist decode | wl-copy
bind = $mainMod, L, exec, loginctl lock-session

#fix waybar if it breaks
bind = $mainMod SHIFT, W, exec, bash -c "pkill waybar; waybar &"

# set a random wallpaper
bind = $mainMod, R, exec, $HOME/.config/hypr/scripts/wallpapers/set-random.sh
bind = $mainMod  SHIFT, R, exec, $HOME/.config/hypr/scripts/wallpapers/set-in-order.sh
bind = $mainMod, W, exec, $HOME/.config/hypr/scripts/wallpapers/set-wallpaper.sh


# WM Control binds
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, hyprsession save && hyprctl dispatch exit
bind = $mainMod, F, togglefloating,
bind = $mainMod, X, fullscreen, 0,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
## Window Switch
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
# Window Move
bind = $mainMod ALT SHIFT, left, movewindow, l
bind = $mainMod ALT SHIFT, right, movewindow, r
bind = $mainMod ALT SHIFT, up, movewindow, u
bind = $mainMod ALT SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, Tab, workspace, previous
bind = $mainMod ALT, left, workspace, -1
bind = $mainMod ALT, right, workspace, +1


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, left, movetoworkspace, -1
bind = $mainMod SHIFT, right, movetoworkspace, +1

#shutdown
bind = $mainMod SHIFT, S, exec, bash -c "~/.config/hypr/scripts/powermenu.sh"

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

#bind = $mainMod, S, layoutmsg, focusmaster

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-


# Screenshot a window
bind = $mainMod, PRINT, exec, hyprshot -m window -o /home/logan/Pictures/Screenshots
# Screenshot a monitor
bind = , PRINT, exec, hyprshot -m output -o /home/logan/Pictures/Screenshots
# Screenshot a region
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region -o /home/logan/Pictures/Screenshots

